{% extends "taxi/base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4 card shadow p-4">
        <h3 class="text-center">Вход в систему</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Войти</button>
        </form>
        <p class="mt-3 text-center">Нет аккаунта? <a href="{% url 'register' %}">Регистрация</a></p>
    </div>
</div>
{% endblock %}
